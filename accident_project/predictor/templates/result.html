<!DOCTYPE html>
<html>
<head>
<title>Prediction Result</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#000000,#0a1a2f);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.card{
    background:#111;
    padding:40px;
    width:500px;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,150,255,0.4);
    text-align:center;
}

h1{
    color:#66c2ff;
    margin-bottom:30px;
}

.severity-box{
    display:flex;
    justify-content:space-between;
    margin-bottom:30px;
}

.level{
    flex:1;
    margin:5px;
    padding:15px;
    border-radius:6px;
    background:#1a1a1a;
    font-weight:bold;
    border:1px solid #333;
}

/* Active severity highlight */
.active{
    background:#66c2ff;
    color:black;
}

/* Button */
button{
    padding:10px 20px;
    background:#66c2ff;
    border:none;
    color:black;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:#4db8ff;
    transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h1>Accident Severity Prediction</h1>

<div class="severity-box">

<div class="level {% if result == 'Minor' %}active{% endif %}">
Minor
</div>

<div class="level {% if result == 'Moderate' %}active{% endif %}">
Moderate
</div>

<div class="level {% if result == 'Severe' %}active{% endif %}">
Severe
</div>

</div>

<a href="/predict/">
<button>Predict Again</button>
</a>

</div>

</body>
</html>
